<hr>
<div class="row">
    <div class="col-3">
        <div class="p-4" [ngClass] = "divClassName">div 1</div>
    </div>
</div>
<div>
    <div>
        <div class="p-4" [ngClass] = "ischeckedActive == true ? 'bg-warning' : 'bg-primary'">
            div 2
        </div>
    </div>
</div>
<br><br>
<div>
    <div>
        <button (click)="addDiv1Class('bg-success')">success</button>
        <button (click)="addDiv1Class('bg-danger')">danger</button>
    </div>
</div>
<div>
    <input type="checkbox" [(ngModel)] = "ischeckedActive">
    {{ischeckedActive}}
</div>

<input type="text" [(ngModel)] = "num1">
<h1 [ngClass] = "num1.length > 5 ? 'text-danger':'text-success'">
    {{num1.length > 5 ? 'text is invalid': 'text is valid'}}
</h1>
<div>
    <button (click) = "checkCharLength()">check length</button>
</div>

<hr>
